<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <circle cx="100" cy="100" r="95" fill="#667eea" opacity="0.1" stroke="#667eea" stroke-width="2"/>
  
  <!-- Clapperboard top -->
  <g transform="translate(40, 30) rotate(-15)">
    <!-- Top part of clapperboard (opening) -->
    <rect x="0" y="0" width="120" height="25" fill="#1e40af" rx="3"/>
    <!-- Blue stripes -->
    <rect x="10" y="0" width="15" height="25" fill="#3b82f6"/>
    <rect x="35" y="0" width="15" height="25" fill="#3b82f6"/>
    <rect x="60" y="0" width="15" height="25" fill="#3b82f6"/>
    <rect x="85" y="0" width="15" height="25" fill="#3b82f6"/>
  </g>
  
  <!-- Clapperboard bottom (main board) -->
  <g transform="translate(30, 60)">
    <!-- Main rectangle -->
    <rect x="0" y="0" width="140" height="80" fill="#e5e7eb" stroke="#1e40af" stroke-width="3" rx="5"/>
    
    <!-- Stripes -->
    <rect x="5" y="5" width="130" height="30" fill="white" stroke="#1e40af" stroke-width="2"/>
    
    <!-- Blue diagonal stripes inside top section -->
    <g clip-path="url(#clip)">
      <line x1="15" y1="0" x2="40" y2="35" stroke="#3b82f6" stroke-width="8"/>
      <line x1="40" y1="0" x2="65" y2="35" stroke="#3b82f6" stroke-width="8"/>
      <line x1="65" y1="0" x2="90" y2="35" stroke="#3b82f6" stroke-width="8"/>
      <line x1="90" y1="0" x2="115" y2="35" stroke="#3b82f6" stroke-width="8"/>
    </g>
    
    <!-- Play button circle background -->
    <circle cx="70" cy="55" r="28" fill="white" stroke="#1e40af" stroke-width="2"/>
    
    <!-- Play triangle (red/pink) -->
    <polygon points="58,43 58,67 88,55" fill="#ef4444"/>
  </g>
  
  <!-- Clip path definition -->
  <defs>
    <clipPath id="clip">
      <rect x="5" y="5" width="130" height="30"/>
    </clipPath>
  </defs>
</svg>
