services:
  # PostgreSQL database for analytics/logging
  db:
    image: postgres:16-alpine
    container_name: instagram-downloader-db
    environment:
      - POSTGRES_DB=videosnap
      - POSTGRES_USER=videosnap
      - POSTGRES_PASSWORD=videosnap_secure_password
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U videosnap"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Cobalt API (used for Instagram downloads)
  cobalt:
    image: ghcr.io/imputnet/cobalt:latest
    container_name: instagram-cobalt
    ports:
      - "5000:8000"
    environment:
      - API_URL=http://cobalt:8000
      - API_PORT=8000
      - CORS_WILDCARD=1
    restart: unless-stopped

  # Node.js proxy server (routes frontend requests to Cobalt)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: instagram-downloader-backend
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - COBALT_URL=http://cobalt:8000
      - DATABASE_URL=postgresql://videosnap:videosnap_secure_password@db:5432/videosnap
    depends_on:
      db:
        condition: service_healthy
      cobalt:
        condition: service_started
    restart: unless-stopped
    volumes:
      # Optional: for development
      - ./backend/proxy.js:/app/proxy.js

  # Frontend React app
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - VITE_API_BASE_URL=https://videosnap.fun
    container_name: instagram-downloader-frontend
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
