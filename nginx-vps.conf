# /etc/nginx/sites-available/videosnap.fun
# Place this file on your VPS at: /etc/nginx/sites-available/videosnap.fun
# Then run: sudo ln -s /etc/nginx/sites-available/videosnap.fun /etc/nginx/sites-enabled/
# Then run: sudo certbot --nginx -d videosnap.fun -d www.videosnap.fun

server {
    listen 80;
    server_name videosnap.fun www.videosnap.fun;

    # Certbot will modify this block to add SSL redirect
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name videosnap.fun www.videosnap.fun;

    # SSL certificates (filled in by certbot)
    ssl_certificate /etc/letsencrypt/live/videosnap.fun/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/videosnap.fun/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Route /api/* to backend proxy (Node.js)
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Route / and subpaths to React frontend (landing page + /insta + /youtube)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
